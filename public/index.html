<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeBridge – Terminfinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    --ink: #1C2333;
    --panel: #242C40;
    --panel-2: #2C3550;
    --paper: #F5F1E6;
    --amber: #E8A33D;
    --amber-dark: #7A5417;
    --forest: #4C8C6B;
    --forest-dark: #1E3D2C;
    --rust: #C24E3A;
    --rust-dark: #4A1C13;
    --muted: #8993A6;
    --line: #3A4360;
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    color: var(--paper);
    margin: 0;
    padding: 28px 16px 60px;
  }
  #tf-root { max-width: 720px; margin: 0 auto; position: relative; }
  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; margin: 0; }
  button { font-family: 'Inter', sans-serif; cursor: pointer; border-radius: 6px; }
  input, textarea {
    font-family: 'Inter', sans-serif; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--paper); border-radius: 6px; padding: 10px 12px; font-size: 14px; width: 100%;
  }
  input:focus, textarea:focus, button:focus-visible { outline: 2px solid var(--amber); outline-offset: 1px; }
  ::placeholder { color: var(--muted); }

  .tf-lang-switch { position: absolute; top: 0; right: 16px; display: flex; gap: 6px; }
  .tf-lang-btn {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    width: 34px; height: 30px; font-size: 16px; display: flex; align-items: center; justify-content: center;
    opacity: 0.55; filter: grayscale(40%);
  }
  .tf-lang-btn.active { opacity: 1; filter: none; border-color: var(--amber); }
  .tf-lang-btn:hover { opacity: 1; }

  .tf-header { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 6px 0 30px; }
  .tf-logo-icon { width: 56px; height: 44px; flex-shrink: 0; }
  .tf-logo-check {
    animation: tf-pulse 2.8s ease-in-out infinite;
    transform-origin: center;
  }
  .tf-logo-arc {
    stroke-dasharray: 4 4;
    animation: tf-flow 6s linear infinite;
  }
  @keyframes tf-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }
  @keyframes tf-flow {
    to { stroke-dashoffset: -32; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tf-logo-check, .tf-logo-arc { animation: none; }
  }
  .tf-wordmark { font-family: 'Space Grotesk', sans-serif; font-size: 30px; white-space: nowrap; }
  .tf-wordmark .tf-w1 { color: var(--paper); font-weight: 500; }
  .tf-wordmark .tf-w2 { color: var(--amber); font-weight: 700; }

  .tf-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .tf-card h2 { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
  .tf-card p.tf-sub { color: var(--muted); font-size: 13px; margin: 0 0 14px; }

  .tf-row { display: flex; gap: 10px; }
  .tf-btn-primary { background: var(--amber); color: #241a05; border: none; font-weight: 600; padding: 10px 16px; font-size: 14px; }
  .tf-btn-primary:hover { background: #f0b158; }
  .tf-btn-primary:disabled { opacity: 0.5; cursor: default; }
  .tf-btn-secondary { background: transparent; color: var(--paper); border: 1px solid var(--line); padding: 10px 16px; font-size: 14px; }
  .tf-btn-secondary:hover { border-color: var(--muted); }
  .tf-btn-secondary:disabled { opacity: 0.4; cursor: default; }
  .tf-btn-icon {
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .tf-btn-icon:hover { color: var(--rust); border-color: var(--rust); }

  .tf-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; letter-spacing: 0.02em; }
  .tf-field { margin-bottom: 14px; }
  .tf-hint { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .tf-option-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .tf-option-row input[type=date] { flex: 2; }
  .tf-option-row input[type=time] { flex: 1; }

  .tf-poll-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px; border-top: 1px solid var(--line); cursor: pointer; }
  .tf-poll-list-item:hover .tf-poll-title { color: var(--amber); }
  .tf-poll-title { font-weight: 500; font-size: 14px; }
  .tf-poll-meta { color: var(--muted); font-size: 12px; }
  .tf-poll-code { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--amber); background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; padding: 3px 7px; }

  .tf-code-display {
    font-family: 'IBM Plex Mono', monospace; font-size: 22px; letter-spacing: 0.15em;
    color: var(--amber); background: var(--panel-2); border: 1px dashed var(--line);
    border-radius: 6px; padding: 10px 14px; text-align: center; cursor: pointer; user-select: all;
  }
  .tf-code-hint { text-align: center; color: var(--muted); font-size: 12px; margin-top: 6px; }

  table.tf-grid { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.tf-grid th, table.tf-grid td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--line); }
  table.tf-grid th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  table.tf-grid td.tf-date-cell { text-align: left; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--paper); white-space: nowrap; }

  .tf-vote-toggle { width: 30px; height: 30px; border-radius: 5px; border: 1px solid var(--line); background: var(--panel-2); color: var(--muted); font-size: 15px; margin: 0 3px; }
  .tf-vote-toggle.yes.active { background: var(--forest); border-color: var(--forest); color: #eafff1; }
  .tf-vote-toggle.no.active { background: var(--rust); border-color: var(--rust); color: #ffeeea; }

  .tf-flap-cell { width: 26px; height: 26px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .tf-flap-cell.yes { background: var(--forest-dark); color: #8fe0b4; }
  .tf-flap-cell.no { background: var(--rust-dark); color: #f0a696; }
  .tf-best-row td { background: rgba(232, 163, 61, 0.08); }
  .tf-best-badge { font-size: 10px; background: var(--amber); color: #241a05; border-radius: 3px; padding: 1px 5px; margin-left: 6px; font-weight: 600; vertical-align: middle; }
  .tf-final-banner { background: rgba(76, 140, 107, 0.15); border: 1px solid var(--forest); color: #bdeed2; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }

  .tf-participant-col { font-size: 11px; color: var(--muted); font-weight: 500; }
  .tf-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 18px 0; }
  .tf-error { color: var(--rust); font-size: 13px; margin-top: 8px; }
  .tf-ok { color: var(--forest); font-size: 12px; margin-top: 6px; }
  .tf-back { color: var(--muted); font-size: 13px; background: none; border: none; padding: 0; margin-bottom: 16px; }
  .tf-back:hover { color: var(--paper); }
  .tf-loading { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }

  .tf-status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .tf-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); color: var(--muted); }
  .tf-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .tf-badge.live { color: #bdeed2; border-color: var(--forest); }
  .tf-badge.live .dot { background: var(--forest); }
  .tf-badge.poll .dot { background: var(--amber); }
  .tf-badge.poll { color: var(--amber); border-color: var(--amber-dark); }

  .tf-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-top: 1px solid var(--line); }
  .tf-toggle-row:first-child { border-top: none; }
  .tf-toggle-label { font-size: 13px; }
  .tf-toggle-sub { font-size: 11px; color: var(--muted); }
  .tf-switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
  .tf-switch input { opacity: 0; width: 0; height: 0; }
  .tf-switch-track { position: absolute; inset: 0; background: var(--panel-2); border: 1px solid var(--line); border-radius: 20px; transition: background .15s; }
  .tf-switch-track::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: var(--muted); border-radius: 50%; transition: transform .15s, background .15s; }
  .tf-switch input:checked + .tf-switch-track { background: var(--forest-dark); border-color: var(--forest); }
  .tf-switch input:checked + .tf-switch-track::before { transform: translateX(16px); background: #bdeed2; }
</style>
</head>
<body>
<div id="tf-root">
  <div class="tf-lang-switch" id="tf-lang-switch">
    <button class="tf-lang-btn" data-lang="de" aria-label="Deutsch">🇩🇪</button>
    <button class="tf-lang-btn" data-lang="en" aria-label="English">🇬🇧</button>
  </div>
  <div id="tf-app"></div>
</div>

<script>
(function() {
  const root = document.getElementById('tf-app');
  const POLL_INTERVAL_MS = 8000;

  const STR = {
    de: {
      appName: "Wann passt's?",
      createTitle: 'Neue Umfrage erstellen', createSub: 'Schlage mehrere Termine vor und lade andere zur Abstimmung ein.', createBtn: '+ Umfrage erstellen',
      joinTitle: 'Umfrage per Code öffnen', joinSub: 'Code von jemand anderem erhalten? Hier eingeben.', joinPlaceholder: 'z.B. A1B2C3', joinBtn: 'Öffnen',
      recentTitle: 'Zuletzt erstellt', recentEmpty: 'Noch keine Umfragen vorhanden.',
      notifTitle: 'Browser-Benachrichtigungen', notifEnable: 'Erlauben', notifGranted: 'Aktiviert ✓', notifDenied: 'Blockiert (in Browser-Einstellungen ändern)', notifUnsupported: 'Nicht unterstützt',
      pollNotFound: 'Keine Umfrage mit diesem Code gefunden.',
      back: '← Zurück', backAll: '← Alle Umfragen',
      newPollTitle: 'Neue Umfrage',
      titleLabel: 'Titel', titlePlaceholder: "z.B. Grillabend im Park",
      descLabel: 'Beschreibung (optional)', descPlaceholder: 'Weitere Infos für die Teilnehmer',
      nameLabel: 'Dein Name', namePlaceholder: 'Wird als Ersteller angezeigt',
      optionsLabel: 'Terminvorschläge', addOptionBtn: '+ Termin hinzufügen',
      submitCreateBtn: 'Umfrage erstellen', creatingBtn: 'Wird erstellt …',
      notifSectionTitle: 'Benachrichtigungen', notifSectionSub: 'Jeder Kanal lässt sich einzeln an- oder ausschalten.',
      pushLabel: 'Browser-Benachrichtigungen', pushSub: 'Live-Hinweis bei neuen Stimmen',
      emailLabel: 'E-Mail', emailSub: 'Einladung, Erinnerung, Abschlussmail',
      emailsLabel: 'E-Mail-Adressen der Teilnehmer', emailsPlaceholder: 'anna@beispiel.de, ben@beispiel.de', emailsHint: 'Kommagetrennt oder je eine pro Zeile.',
      teamsLabel: 'Microsoft Teams', teamsSub: 'Meldung im Kanal',
      teamsWebhookLabel: 'Teams-Webhook-URL (optional, überschreibt Server-Standard)',
      errTitleRequired: 'Bitte einen Titel eingeben.', errNameRequired: 'Bitte deinen Namen eingeben.', errDateRequired: 'Bitte mindestens einen Termin mit Datum angeben.',
      errCreateFailed: 'Umfrage konnte nicht erstellt werden. Serververbindung prüfen.',
      errVoteRequired: 'Bitte deinen Namen eingeben.', errChoiceRequired: 'Bitte für mindestens einen Termin abstimmen.', errVoteSaveFailed: 'Stimme konnte nicht gespeichert werden.',
      createdBy: 'Erstellt von', codeHint: 'Diesen Code an andere weitergeben, damit sie hier mit abstimmen können.',
      copyLinkBtn: "🔗 Direkten Link zu dieser Umfrage kopieren", linkCopied: '✓ Link kopiert', codeCopied: 'Kopiert!',
      yourVoteTitle: 'Deine Stimme', saveVoteBtn: 'Abstimmung speichern', savingVoteBtn: 'Wird gespeichert …',
      resultsTitle: (n) => `Ergebnisse (${n} Teilnehmer)`, refreshBtn: '↻ Aktualisieren', noVotesYet: 'Noch keine Stimmen abgegeben.',
      dateCol: 'Termin', yesCol: 'Ja',
      organizerTitle: 'Für Organisatoren', remindBtn: 'Erinnerung an Nicht-Abstimmende senden',
      finalizeLabel: 'Termin final festlegen', finalizeSelectPlaceholder: 'Termin wählen …', finalizeBtn: 'Abschließen',
      finalBanner: (d) => `✅ Termin steht fest: ${d}`,
      remindSent: (n) => `Erinnerung an ${n} Person(en) gesendet.`, remindFailed: 'Erinnerung konnte nicht gesendet werden.',
      finalizeChooseFirst: 'Bitte zuerst einen Termin auswählen.', finalizeOk: 'Termin final festgelegt, Beteiligte wurden informiert.', finalizeFailed: 'Konnte nicht abgeschlossen werden.',
      liveLabel: 'Live', pollLabel: 'Aktualisiert alle 8s', localLabel: 'Lokal',
      newVoteTitle: 'Neue Stimme(n) eingegangen', newVoteBody: (names) => `${names} hat/haben abgestimmt.`,
      dateLocale: 'de-DE'
    },
    en: {
      appName: "When works?",
      createTitle: 'Create a new poll', createSub: 'Suggest a few dates and invite others to vote.', createBtn: '+ Create poll',
      joinTitle: 'Open a poll by code', joinSub: 'Got a code from someone else? Enter it here.', joinPlaceholder: 'e.g. A1B2C3', joinBtn: 'Open',
      recentTitle: 'Recently created', recentEmpty: 'No polls yet.',
      notifTitle: 'Browser notifications', notifEnable: 'Enable', notifGranted: 'Enabled ✓', notifDenied: 'Blocked (change in browser settings)', notifUnsupported: 'Not supported',
      pollNotFound: 'No poll found with that code.',
      back: '← Back', backAll: '← All polls',
      newPollTitle: 'New poll',
      titleLabel: 'Title', titlePlaceholder: 'e.g. Team barbecue in the park',
      descLabel: 'Description (optional)', descPlaceholder: 'Extra info for participants',
      nameLabel: 'Your name', namePlaceholder: 'Shown as the organizer',
      optionsLabel: 'Suggested dates', addOptionBtn: '+ Add date',
      submitCreateBtn: 'Create poll', creatingBtn: 'Creating …',
      notifSectionTitle: 'Notifications', notifSectionSub: 'Each channel can be switched on or off individually.',
      pushLabel: 'Browser notifications', pushSub: 'Live alert when new votes come in',
      emailLabel: 'Email', emailSub: 'Invite, reminder, final confirmation',
      emailsLabel: 'Participant email addresses', emailsPlaceholder: 'anna@example.com, ben@example.com', emailsHint: 'Comma-separated or one per line.',
      teamsLabel: 'Microsoft Teams', teamsSub: 'Post updates to the channel',
      teamsWebhookLabel: 'Teams webhook URL (optional, overrides server default)',
      errTitleRequired: 'Please enter a title.', errNameRequired: 'Please enter your name.', errDateRequired: 'Please add at least one date.',
      errCreateFailed: 'Could not create the poll. Check the server connection.',
      errVoteRequired: 'Please enter your name.', errChoiceRequired: 'Please vote on at least one date.', errVoteSaveFailed: 'Could not save your vote.',
      createdBy: 'Created by', codeHint: 'Share this code with others so they can vote here too.',
      copyLinkBtn: '🔗 Copy direct link to this poll', linkCopied: '✓ Link copied', codeCopied: 'Copied!',
      yourVoteTitle: 'Your vote', saveVoteBtn: 'Save vote', savingVoteBtn: 'Saving …',
      resultsTitle: (n) => `Results (${n} participants)`, refreshBtn: '↻ Refresh', noVotesYet: 'No votes yet.',
      dateCol: 'Date', yesCol: 'Yes',
      organizerTitle: 'For organizers', remindBtn: 'Send reminder to non-voters',
      finalizeLabel: 'Finalize the date', finalizeSelectPlaceholder: 'Choose a date …', finalizeBtn: 'Finalize',
      finalBanner: (d) => `✅ Date confirmed: ${d}`,
      remindSent: (n) => `Reminder sent to ${n} people.`, remindFailed: 'Could not send reminder.',
      finalizeChooseFirst: 'Please choose a date first.', finalizeOk: 'Date finalized, participants notified.', finalizeFailed: 'Could not finalize.',
      liveLabel: 'Live', pollLabel: 'Refreshes every 8s', localLabel: 'Local',
      newVoteTitle: 'New vote(s) received', newVoteBody: (names) => `${names} voted.`,
      dateLocale: 'en-GB'
    }
  };

  const state = {
    view: 'home', pollIndex: [], createOptions: [],
    createNotify: { email: false, teams: false, push: true },
    createEmails: '', createTeamsWebhook: '',
    currentPoll: null, currentPollId: null, votes: [],
    myName: localStorage.getItem('tf-my-name') || '',
    myChoices: {}, error: '', loading: false, liveMode: 'none',
    notifPermission: (typeof Notification !== 'undefined') ? Notification.permission : 'unsupported',
    orgMsg: '',
    lang: localStorage.getItem('tf-lang') || ((navigator.language || '').toLowerCase().startsWith('de') ? 'de' : 'en')
  };
  if (!STR[state.lang]) state.lang = 'de';
  let eventSource = null, pollTimer = null, knownVoteKeys = new Set();

  function t() { return STR[state.lang]; }
  function setLang(l) { state.lang = l; localStorage.setItem('tf-lang', l); document.documentElement.lang = l; renderLangSwitch(); render(); }
  function renderLangSwitch() {
    document.querySelectorAll('.tf-lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === state.lang);
    });
  }
  document.querySelectorAll('.tf-lang-btn').forEach(btn => btn.onclick = () => setLang(btn.getAttribute('data-lang')));
  renderLangSwitch();

  function uid() { return Math.random().toString(36).slice(2, 8).toUpperCase(); }
  function getVoterId() {
    let id = localStorage.getItem('tf-voter-id');
    if (!id) { id = (crypto.randomUUID ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).slice(2))); localStorage.setItem('tf-voter-id', id); }
    return id;
  }
  const voterId = getVoterId();
  function sanitizeKey(str) { return (str || 'gast').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').slice(0, 40) || 'gast'; }
  function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  async function api(path, opts) {
    try { const res = await fetch(path, opts); if (!res.ok) return null; return await res.json(); }
    catch (e) { console.error('API-Aufruf fehlgeschlagen', path, e); return null; }
  }
  const apiGet = (p) => api(p);
  const apiPost = (p, body) => api(p, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });

  function fmtOption(opt) {
    const d = new Date(opt.date + 'T' + (opt.time || '00:00'));
    const dateStr = d.toLocaleDateString(t().dateLocale, { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
    return opt.time ? dateStr + (state.lang === 'de' ? ', ' + opt.time + ' Uhr' : ', ' + opt.time) : dateStr;
  }

  const CAL_ICON =
    '<svg class="tf-logo-icon" viewBox="0 0 100 78" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TimeBridge Logo">' +
      '<line x1="10" y1="10" x2="34" y2="40" stroke="var(--amber)" stroke-width="3" stroke-linecap="round"/>' +
      '<line x1="10" y1="10" x2="66" y2="40" stroke="var(--amber)" stroke-width="3" stroke-linecap="round"/>' +
      '<line x1="90" y1="10" x2="66" y2="40" stroke="var(--amber)" stroke-width="3" stroke-linecap="round"/>' +
      '<line x1="90" y1="10" x2="34" y2="40" stroke="var(--amber)" stroke-width="3" stroke-linecap="round"/>' +
      '<path class="tf-logo-arc" d="M 22 40 A 28 28 0 0 0 78 40" fill="none" stroke="var(--amber)" stroke-width="3" stroke-linecap="round"/>' +
      '<circle cx="10" cy="10" r="6" fill="var(--ink)" stroke="var(--amber)" stroke-width="3"/>' +
      '<circle cx="90" cy="10" r="6" fill="var(--ink)" stroke="var(--amber)" stroke-width="3"/>' +
      '<circle cx="34" cy="40" r="6" fill="var(--ink)" stroke="var(--amber)" stroke-width="3"/>' +
      '<circle cx="66" cy="40" r="6" fill="var(--ink)" stroke="var(--amber)" stroke-width="3"/>' +
      '<path class="tf-logo-check" d="M 40 38 L 47 46 L 61 30" fill="none" stroke="#8fe0b4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';

  function stopLive() {
    if (eventSource) { eventSource.close(); eventSource = null; }
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    state.liveMode = 'none';
  }
  function startLive(pollId) {
    stopLive();
    try {
      eventSource = new EventSource('/api/polls/' + pollId + '/stream');
      eventSource.addEventListener('vote', () => refreshPollView(true));
      eventSource.addEventListener('finalized', () => refreshPollView(true));
      eventSource.onerror = () => { if (eventSource) { eventSource.close(); eventSource = null; } startPolling(pollId); };
      state.liveMode = 'sse';
      renderStatusBadgeOnly();
    } catch (e) { startPolling(pollId); }
  }
  function startPolling(pollId) {
    state.liveMode = 'poll';
    renderStatusBadgeOnly();
    pollTimer = setInterval(() => refreshPollView(false), POLL_INTERVAL_MS);
  }
  function renderStatusBadgeOnly() {
    const el = document.getElementById('tf-status-badge');
    if (!el) return;
    if (state.liveMode === 'sse') { el.className = 'tf-badge live'; el.innerHTML = '<span class="dot"></span>' + t().liveLabel; }
    else if (state.liveMode === 'poll') { el.className = 'tf-badge poll'; el.innerHTML = '<span class="dot"></span>' + t().pollLabel; }
    else { el.className = 'tf-badge'; el.innerHTML = '<span class="dot"></span>' + t().localLabel; }
  }
  async function refreshPollView(fromLiveEvent) {
    if (state.view !== 'poll' || !state.currentPollId) return;
    const votes = await apiGet('/api/polls/' + state.currentPollId + '/votes');
    if (!votes) return;
    const newKeys = new Set(votes.map(v => sanitizeKey(v.name)));
    const addedVoters = votes.filter(v => !knownVoteKeys.has(sanitizeKey(v.name))).map(v => v.name);
    knownVoteKeys = newKeys;
    state.votes = votes;
    const poll = await apiGet('/api/polls/' + state.currentPollId);
    if (poll) state.currentPoll.finalizedOptionId = poll.finalizedOptionId;
    if (addedVoters.length && fromLiveEvent === false) notifyBrowser(t().newVoteTitle, t().newVoteBody(addedVoters.join(', ')));
    render();
  }
  function notifyBrowser(title, body) {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    try { new Notification(title, { body }); } catch (e) {}
  }
  async function requestNotifPermission() {
    if (typeof Notification === 'undefined') { state.notifPermission = 'unsupported'; render(); return; }
    state.notifPermission = await Notification.requestPermission();
    render();
  }

  function render() {
    if (state.view === 'home') return renderHome();
    if (state.view === 'create') return renderCreate();
    if (state.view === 'poll') return renderPoll();
  }

  function renderHome() {
    const s = t();
    const listHtml = state.pollIndex.length
      ? state.pollIndex.slice(0, 8).map(p =>
          '<div class="tf-poll-list-item" data-action="open-poll" data-id="' + p.id + '">' +
            '<div><div class="tf-poll-title">' + escapeHtml(p.title) + '</div>' +
            '<div class="tf-poll-meta">' + new Date(p.createdAt).toLocaleDateString(s.dateLocale) + '</div></div>' +
            '<span class="tf-poll-code">' + p.id + '</span></div>'
        ).join('')
      : '<div class="tf-empty">' + s.recentEmpty + '</div>';

    root.innerHTML =
      '<div class="tf-header">' + CAL_ICON + '<div class="tf-wordmark"><span class="tf-w1">Time</span><span class="tf-w2">Bridge</span></div></div>' +
      '<div class="tf-card"><h2>' + s.createTitle + '</h2><p class="tf-sub">' + s.createSub + '</p>' +
        '<button class="tf-btn-primary" data-action="goto-create">' + s.createBtn + '</button></div>' +
      '<div class="tf-card"><h2>' + s.joinTitle + '</h2><p class="tf-sub">' + s.joinSub + '</p>' +
        '<div class="tf-row"><input id="tf-join-code" placeholder="' + s.joinPlaceholder + '" maxlength="8" style="text-transform:uppercase" />' +
        '<button class="tf-btn-secondary" data-action="join-code">' + s.joinBtn + '</button></div>' +
        (state.error ? '<div class="tf-error">' + escapeHtml(state.error) + '</div>' : '') + '</div>' +
      '<div class="tf-card"><h2>' + s.recentTitle + '</h2>' + listHtml + '</div>';

    root.querySelector('[data-action="goto-create"]').onclick = () => {
      state.view = 'create';
      state.createOptions = [{ id: uid(), date: '', time: '' }, { id: uid(), date: '', time: '' }];
      state.createNotify = { email: false, teams: false, push: true };
      state.createEmails = ''; state.createTeamsWebhook = '';
      state._title = ''; state._desc = ''; state._creator = state.myName;
      state.error = ''; render();
    };
    root.querySelector('[data-action="join-code"]').onclick = () => {
      const code = root.querySelector('#tf-join-code').value.trim().toUpperCase();
      if (code) openPoll(code);
    };
    root.querySelectorAll('[data-action="open-poll"]').forEach(el => { el.onclick = () => openPoll(el.getAttribute('data-id')); });
  }

  function renderCreate() {
    const s = t();
    const optsHtml = state.createOptions.map(o =>
      '<div class="tf-option-row" data-opt-id="' + o.id + '">' +
        '<input type="date" data-field="date" data-id="' + o.id + '" value="' + o.date + '" />' +
        '<input type="time" data-field="time" data-id="' + o.id + '" value="' + o.time + '" />' +
        '<button class="tf-btn-icon" data-action="remove-option" data-id="' + o.id + '" aria-label="remove">✕</button></div>'
    ).join('');
    const n = state.createNotify;

    root.innerHTML =
      '<button class="tf-back" data-action="back-home">' + s.back + '</button>' +
      '<div class="tf-card"><h2>' + s.newPollTitle + '</h2>' +
        '<div class="tf-field"><label class="tf-label">' + s.titleLabel + '</label><input id="tf-title" placeholder="' + s.titlePlaceholder + '" value="' + escapeHtml(state._title || '') + '" /></div>' +
        '<div class="tf-field"><label class="tf-label">' + s.descLabel + '</label><textarea id="tf-desc" rows="2" placeholder="' + s.descPlaceholder + '">' + escapeHtml(state._desc || '') + '</textarea></div>' +
        '<div class="tf-field"><label class="tf-label">' + s.nameLabel + '</label><input id="tf-creator" placeholder="' + s.namePlaceholder + '" value="' + escapeHtml(state._creator || '') + '" /></div>' +
        '<div class="tf-field"><label class="tf-label">' + s.optionsLabel + '</label><div id="tf-options">' + optsHtml + '</div>' +
        '<button class="tf-btn-secondary" data-action="add-option" style="margin-top:4px">' + s.addOptionBtn + '</button></div>' +
        (state.error ? '<div class="tf-error">' + escapeHtml(state.error) + '</div>' : '') +
        '<button class="tf-btn-primary" data-action="submit-create" style="margin-top:8px">' + s.submitCreateBtn + '</button></div>' +
      '<div class="tf-card"><h2>' + s.notifSectionTitle + '</h2><p class="tf-sub">' + s.notifSectionSub + '</p>' +
        '<div class="tf-toggle-row"><div><div class="tf-toggle-label">' + s.pushLabel + '</div><div class="tf-toggle-sub">' + s.pushSub + '</div></div>' +
        '<label class="tf-switch"><input type="checkbox" data-notify="push" ' + (n.push ? 'checked' : '') + '><span class="tf-switch-track"></span></label></div>' +
        '<div class="tf-toggle-row"><div><div class="tf-toggle-label">' + s.emailLabel + '</div><div class="tf-toggle-sub">' + s.emailSub + '</div></div>' +
        '<label class="tf-switch"><input type="checkbox" data-notify="email" ' + (n.email ? 'checked' : '') + '><span class="tf-switch-track"></span></label></div>' +
        (n.email ? '<div class="tf-field" style="margin-top:10px"><label class="tf-label">' + s.emailsLabel + '</label>' +
          '<textarea id="tf-emails" rows="2" placeholder="' + s.emailsPlaceholder + '">' + escapeHtml(state.createEmails) + '</textarea>' +
          '<div class="tf-hint">' + s.emailsHint + '</div></div>' : '') +
        '<div class="tf-toggle-row"><div><div class="tf-toggle-label">' + s.teamsLabel + '</div><div class="tf-toggle-sub">' + s.teamsSub + '</div></div>' +
        '<label class="tf-switch"><input type="checkbox" data-notify="teams" ' + (n.teams ? 'checked' : '') + '><span class="tf-switch-track"></span></label></div>' +
        (n.teams ? '<div class="tf-field" style="margin-top:10px"><label class="tf-label">' + s.teamsWebhookLabel + '</label>' +
          '<input id="tf-teams-webhook" placeholder="https://outlook.office.com/webhook/…" value="' + escapeHtml(state.createTeamsWebhook) + '" /></div>' : '') +
        '</div>';

    root.querySelector('[data-action="back-home"]').onclick = () => { state.view = 'home'; state.error = ''; render(); };
    root.querySelector('[data-action="add-option"]').onclick = () => { readCreateForm(); state.createOptions.push({ id: uid(), date: '', time: '' }); render(); };
    root.querySelectorAll('[data-action="remove-option"]').forEach(btn => btn.onclick = () => {
      readCreateForm(); state.createOptions = state.createOptions.filter(o => o.id !== btn.getAttribute('data-id')); render();
    });
    root.querySelectorAll('[data-notify]').forEach(cb => cb.onchange = () => { readCreateForm(); state.createNotify[cb.getAttribute('data-notify')] = cb.checked; render(); });
    root.querySelector('[data-action="submit-create"]').onclick = submitCreate;
  }

  function readCreateForm() {
    const g = (sel) => root.querySelector(sel);
    if (g('#tf-title')) state._title = g('#tf-title').value;
    if (g('#tf-desc')) state._desc = g('#tf-desc').value;
    if (g('#tf-creator')) state._creator = g('#tf-creator').value;
    if (g('#tf-emails')) state.createEmails = g('#tf-emails').value;
    if (g('#tf-teams-webhook')) state.createTeamsWebhook = g('#tf-teams-webhook').value;
    root.querySelectorAll('#tf-options input').forEach(inp => {
      const opt = state.createOptions.find(o => o.id === inp.getAttribute('data-id'));
      if (opt) opt[inp.getAttribute('data-field')] = inp.value;
    });
  }

  async function submitCreate() {
    const s = t();
    readCreateForm();
    const title = (state._title || '').trim();
    const creator = (state._creator || '').trim();
    const validOptions = state.createOptions.filter(o => o.date);
    if (!title) { state.error = s.errTitleRequired; render(); return; }
    if (!creator) { state.error = s.errNameRequired; render(); return; }
    if (validOptions.length < 1) { state.error = s.errDateRequired; render(); return; }
    state.error = '';
    const btn = root.querySelector('[data-action="submit-create"]');
    if (btn) { btn.disabled = true; btn.textContent = s.creatingBtn; }

    const id = uid();
    const options = validOptions.map(o => ({ id: o.id, date: o.date, time: o.time }));
    const emails = state.createEmails.split(/[,\n]/).map(e => e.trim()).filter(Boolean);
    const ok = await apiPost('/api/polls', {
      id, title, description: (state._desc || '').trim(), creator, options,
      emails, notify: state.createNotify, teamsWebhookUrl: state.createTeamsWebhook
    });
    if (!ok) { state.error = s.errCreateFailed; if (btn) { btn.disabled = false; btn.textContent = s.submitCreateBtn; } render(); return; }

    state.myName = creator; localStorage.setItem('tf-my-name', creator);
    openPoll(id);
  }

  async function openPoll(id) {
    const s = t();
    state.view = 'poll'; state.loading = true; state.currentPollId = id; state.error = ''; state.orgMsg = ''; render();
    if (window.location.pathname.replace(/^\/+/, '').toUpperCase() !== id) window.history.pushState({}, '', '/' + id);
    const poll = await apiGet('/api/polls/' + id);
    if (!poll) {
      state.loading = false; state.view = 'home'; state.error = s.pollNotFound;
      window.history.pushState({}, '', '/');
      state.pollIndex = await apiGet('/api/polls') || []; render(); return;
    }
    state.currentPoll = poll;
    state.votes = await apiGet('/api/polls/' + id + '/votes') || [];
    knownVoteKeys = new Set(state.votes.map(v => sanitizeKey(v.name)));
    const mine = state.votes.find(v => sanitizeKey(v.name) === sanitizeKey(state.myName));
    state.myChoices = mine ? { ...mine.choices } : {};
    state.loading = false; render(); startLive(id);
  }

  function computeCounts(poll, votes) {
    const counts = {};
    poll.options.forEach(o => counts[o.id] = { yes: 0, no: 0 });
    votes.forEach(v => poll.options.forEach(o => {
      if (v.choices[o.id] === 'yes') counts[o.id].yes++;
      else if (v.choices[o.id] === 'no') counts[o.id].no++;
    }));
    return counts;
  }

  function renderPoll() {
    const s = t();
    if (state.loading) { root.innerHTML = '<div class="tf-loading">…</div>'; return; }
    const poll = state.currentPoll;
    if (!poll) { root.innerHTML = '<div class="tf-loading">–</div>'; return; }

    const counts = computeCounts(poll, state.votes);
    const maxYes = Math.max(0, ...poll.options.map(o => counts[o.id].yes));
    const finalOption = poll.finalizedOptionId ? poll.options.find(o => o.id === poll.finalizedOptionId) : null;

    const voteRows = poll.options.map(o => {
      const isYes = state.myChoices[o.id] === 'yes', isNo = state.myChoices[o.id] === 'no';
      return '<tr><td class="tf-date-cell">' + fmtOption(o) + '</td><td>' +
        '<button class="tf-vote-toggle yes' + (isYes ? ' active' : '') + '" data-action="vote" data-opt="' + o.id + '" data-val="yes" aria-label="yes">✓</button>' +
        '<button class="tf-vote-toggle no' + (isNo ? ' active' : '') + '" data-action="vote" data-opt="' + o.id + '" data-val="no" aria-label="no">✕</button></td></tr>';
    }).join('');

    const resultRows = poll.options.map(o => {
      const c = counts[o.id], isBest = c.yes === maxYes && maxYes > 0;
      const cells = state.votes.map(v => {
        const ch = v.choices[o.id];
        if (ch === 'yes') return '<td><span class="tf-flap-cell yes">✓</span></td>';
        if (ch === 'no') return '<td><span class="tf-flap-cell no">✕</span></td>';
        return '<td></td>';
      }).join('');
      return '<tr class="' + (isBest ? 'tf-best-row' : '') + '"><td class="tf-date-cell">' + fmtOption(o) + (isBest ? '<span class="tf-best-badge">TOP</span>' : '') + '</td>' + cells + '<td style="color:var(--muted)">' + c.yes + ' / ' + state.votes.length + '</td></tr>';
    }).join('');

    const participantHeaders = state.votes.map(v => '<th class="tf-participant-col">' + escapeHtml(v.name) + '</th>').join('');
    const optionSelectHtml = poll.options.map(o => '<option value="' + o.id + '">' + fmtOption(o) + '</option>').join('');

    root.innerHTML =
      '<button class="tf-back" data-action="back-home">' + s.backAll + '</button>' +
      (finalOption ? '<div class="tf-final-banner">' + s.finalBanner(fmtOption(finalOption)) + '</div>' : '') +
      '<div class="tf-card"><div class="tf-status-row"><h2 style="font-size:20px">' + escapeHtml(poll.title) + '</h2>' +
        '<span class="tf-badge" id="tf-status-badge"><span class="dot"></span>…</span></div>' +
        (poll.description ? '<p class="tf-sub" style="margin-top:8px">' + escapeHtml(poll.description) + '</p>' : '') +
        '<p class="tf-sub">' + s.createdBy + ' ' + escapeHtml(poll.creator) + '</p>' +
        '<div class="tf-code-display" data-action="copy-code" title="' + s.codeCopied + '">' + poll.id + '</div>' +
        '<div class="tf-code-hint">' + s.codeHint + '</div>' +
        '<button class="tf-btn-secondary" data-action="copy-link" style="width:100%;margin-top:10px">' + s.copyLinkBtn + '</button></div>' +
      '<div class="tf-card"><h2>' + s.yourVoteTitle + '</h2>' +
        '<div class="tf-field" style="margin-top:12px"><label class="tf-label">' + s.nameLabel + '</label><input id="tf-vote-name" placeholder="' + s.namePlaceholder + '" value="' + escapeHtml(state.myName) + '" /></div>' +
        '<table class="tf-grid"><tbody>' + voteRows + '</tbody></table>' +
        (state.error ? '<div class="tf-error">' + escapeHtml(state.error) + '</div>' : '') +
        '<button class="tf-btn-primary" data-action="submit-vote" style="margin-top:14px">' + s.saveVoteBtn + '</button></div>' +
      '<div class="tf-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">' +
        '<h2>' + s.resultsTitle(state.votes.length) + '</h2>' +
        '<button class="tf-btn-secondary" data-action="refresh" style="padding:6px 10px;font-size:12px">' + s.refreshBtn + '</button></div>' +
        (state.votes.length ? '<div style="overflow-x:auto"><table class="tf-grid"><thead><tr><th style="text-align:left">' + s.dateCol + '</th>' + participantHeaders + '<th>' + s.yesCol + '</th></tr></thead><tbody>' + resultRows + '</tbody></table></div>' : '<div class="tf-empty">' + s.noVotesYet + '</div>') + '</div>' +
      '<div class="tf-card"><h2>' + s.organizerTitle + '</h2>' +
        '<button class="tf-btn-secondary" data-action="remind">' + s.remindBtn + '</button>' +
        '<div class="tf-field" style="margin-top:14px"><label class="tf-label">' + s.finalizeLabel + '</label>' +
        '<div class="tf-row"><select id="tf-finalize-select" style="flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--paper);border-radius:6px;padding:10px 12px;font-size:14px"><option value="">' + s.finalizeSelectPlaceholder + '</option>' + optionSelectHtml + '</select>' +
        '<button class="tf-btn-secondary" data-action="finalize">' + s.finalizeBtn + '</button></div></div>' +
        (state.orgMsg ? '<div class="tf-ok">' + escapeHtml(state.orgMsg) + '</div>' : '') + '</div>';

    root.querySelector('[data-action="back-home"]').onclick = async () => { stopLive(); state.view = 'home'; state.error = ''; window.history.pushState({}, '', '/'); state.pollIndex = await apiGet('/api/polls') || []; render(); };
    root.querySelector('[data-action="copy-code"]').onclick = (e) => {
      navigator.clipboard && navigator.clipboard.writeText(state.currentPoll.id).catch(() => {});
      const el = e.currentTarget, original = el.textContent;
      el.textContent = s.codeCopied; setTimeout(() => { el.textContent = original; }, 1200);
    };
    root.querySelector('[data-action="copy-link"]').onclick = (e) => {
      const link = window.location.origin + '/' + state.currentPoll.id;
      navigator.clipboard && navigator.clipboard.writeText(link).catch(() => {});
      const el = e.currentTarget, original = el.textContent;
      el.textContent = s.linkCopied; setTimeout(() => { el.textContent = original; }, 1500);
    };
    root.querySelectorAll('[data-action="vote"]').forEach(btn => btn.onclick = () => {
      const opt = btn.getAttribute('data-opt'), val = btn.getAttribute('data-val');
      if (state.myChoices[opt] === val) delete state.myChoices[opt]; else state.myChoices[opt] = val;
      render();
    });
    root.querySelector('[data-action="submit-vote"]').onclick = submitVote;
    root.querySelector('[data-action="refresh"]').onclick = () => refreshPollView(false);
    root.querySelector('[data-action="remind"]').onclick = async (e) => {
      e.target.disabled = true;
      const r = await apiPost('/api/polls/' + state.currentPollId + '/remind', {});
      state.orgMsg = r ? s.remindSent(r.sent) : s.remindFailed;
      render();
    };
    root.querySelector('[data-action="finalize"]').onclick = async () => {
      const sel = root.querySelector('#tf-finalize-select'), optionId = sel ? sel.value : '';
      if (!optionId) { state.orgMsg = s.finalizeChooseFirst; render(); return; }
      const r = await apiPost('/api/polls/' + state.currentPollId + '/finalize', { optionId });
      state.orgMsg = r ? s.finalizeOk : s.finalizeFailed;
      if (r) state.currentPoll.finalizedOptionId = optionId;
      render();
    };
    renderStatusBadgeOnly();
  }

  async function submitVote() {
    const s = t();
    const name = (root.querySelector('#tf-vote-name').value || '').trim();
    if (!name) { state.error = s.errVoteRequired; render(); return; }
    if (Object.keys(state.myChoices).length === 0) { state.error = s.errChoiceRequired; render(); return; }
    state.error = ''; state.myName = name; localStorage.setItem('tf-my-name', name);
    const btn = root.querySelector('[data-action="submit-vote"]');
    if (btn) { btn.disabled = true; btn.textContent = s.savingVoteBtn; }
    const ok = await apiPost('/api/polls/' + state.currentPollId + '/votes', { name, choices: state.myChoices, voterId });
    if (!ok) { state.error = s.errVoteSaveFailed; render(); return; }
    await refreshPollView(true);
  }

  (async function init() {
    document.documentElement.lang = state.lang;
    state.pollIndex = await apiGet('/api/polls') || [];
    const urlCode = window.location.pathname.replace(/^\/+/, '').trim().toUpperCase();
    if (urlCode) openPoll(urlCode); else render();
  })();

  window.addEventListener('popstate', () => {
    const code = window.location.pathname.replace(/^\/+/, '').trim().toUpperCase();
    if (code) openPoll(code);
    else { stopLive(); state.view = 'home'; state.error = ''; render(); }
  });
})();
</script>
</body>
</html>
